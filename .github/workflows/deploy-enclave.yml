name: Deploy Enclave

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "server.js"
      - "package.json"
      - "package-lock.json"
      - "public/**"
      - "enclave.toml"
      - "cert.pem"
      - ".github/workflows/deploy-enclave.yml"
  workflow_dispatch:
    inputs:
      redeploy_run_id:
        description: "Run ID of a previous build to redeploy without rebuilding (leave blank to build fresh)"
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Evervault CLI
        run: curl https://cli.evervault.com/v4/install -sL | sh

      - name: Restore signing key
        env:
          EV_SIGNING_KEY_B64: ${{ secrets.EV_SIGNING_KEY_B64 }}
        run: echo "$EV_SIGNING_KEY_B64" | base64 -d > key.pem

      - name: Build and push app image to GHCR
        if: ${{ github.event.inputs.redeploy_run_id == '' }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker build \
            -t ghcr.io/swindu3/evervault-blackjack-enclave:${{ github.sha }} \
            -t ghcr.io/swindu3/evervault-blackjack-enclave:latest \
            .
          docker push ghcr.io/swindu3/evervault-blackjack-enclave:${{ github.sha }}
          docker push ghcr.io/swindu3/evervault-blackjack-enclave:latest

      - name: Download previously-built EIF for redeploy
        if: ${{ github.event.inputs.redeploy_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          name: enclave-eif
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.inputs.redeploy_run_id }}

      - name: Build Enclave EIF
        if: ${{ github.event.inputs.redeploy_run_id == '' }}
        env:
          EV_API_KEY: ${{ secrets.EV_API_KEY }}
          EV_APP_UUID: ${{ secrets.EV_APP_UUID }}
        run: ev enclave build -v --output . --reproducible

      - name: Upload EIF as a durable build artifact
        if: ${{ github.event.inputs.redeploy_run_id == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: enclave-eif
          path: enclave.eif
          retention-days: 90

      - name: Deploy Enclave
        id: deploy
        env:
          EV_API_KEY: ${{ secrets.EV_API_KEY }}
          EV_APP_UUID: ${{ secrets.EV_APP_UUID }}
        run: |
          ev enclave deploy -v --eif-path enclave.eif 2>&1 | tee deploy.log
          measurements=$(grep -o '{"enclaveDomain".*"status":"success"}' deploy.log | tail -n1)
          echo "pcr0=$(jq -r '.measurements.PCR0' <<< "$measurements")" >> "$GITHUB_OUTPUT"
          echo "pcr1=$(jq -r '.measurements.PCR1' <<< "$measurements")" >> "$GITHUB_OUTPUT"
          echo "pcr2=$(jq -r '.measurements.PCR2' <<< "$measurements")" >> "$GITHUB_OUTPUT"
          echo "pcr8=$(jq -r '.measurements.PCR8' <<< "$measurements")" >> "$GITHUB_OUTPUT"

      - name: Sync PCRs to Railway proxy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          curl -fsSL https://railway.com/install.sh | bash
          export PATH="$HOME/.railway/bin:$PATH"
          railway variable set \
            PCR0="${{ steps.deploy.outputs.pcr0 }}" \
            PCR1="${{ steps.deploy.outputs.pcr1 }}" \
            PCR2="${{ steps.deploy.outputs.pcr2 }}" \
            PCR8="${{ steps.deploy.outputs.pcr8 }}" \
            COMMIT_SHA="${{ github.sha }}" \
            --service railway-proxy
